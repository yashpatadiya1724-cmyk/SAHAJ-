<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAHAJ Map — Wheelchair Accessible India</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .map-layout { display: flex; height: calc(100vh - 70px); }
    .map-sidebar {
      width: 360px;
      height: 100%;
      overflow-y: auto;
      background: white;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    #map { position: absolute; inset: 0; z-index: 1; }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--saffron-pale), var(--blue-light));
    }

    .sidebar-header h2 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }

    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--saffron); }
    .search-box .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .filter-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #FAFAFA;
    }
    .filter-section label { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 8px; }

    .location-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .location-list-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .location-list-item:hover { border-color: var(--saffron); background: var(--saffron-pale); }
    .location-list-item.active { border-color: var(--saffron); background: var(--saffron-pale); }

    .list-marker {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .marker-full { background: var(--accessible-full); color: white; }
    .marker-partial { background: var(--accessible-partial); color: white; }
    .marker-none { background: var(--accessible-none); color: white; }
    .marker-unknown { background: var(--accessible-unknown); color: white; }

    .list-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .list-info p { font-size: 12px; color: var(--text-secondary); }

    .count-badge {
      background: var(--saffron);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 50px;
    }

    /* Leaflet custom markers */
    .marker-pin {
      width: 30px;
      height: 30px;
      border-radius: 50% 50% 50% 0;
      position: absolute;
      transform: rotate(-45deg);
      left: 50%;
      top: 50%;
      margin: -15px 0 0 -15px;
      border: 3px solid white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .pin-label {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 3px solid white;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    .pin-full { background: var(--accessible-full); }
    .pin-partial { background: var(--accessible-partial); }
    .pin-none { background: var(--accessible-none); }
    .pin-unknown { background: var(--accessible-unknown); }

    .popup-card { padding: 0; }
    .popup-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .popup-header h3 { font-size: 15px; font-weight: 700; }
    .popup-header p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .popup-body { padding: 12px 14px; }
    .popup-score {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .popup-features { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .popup-feat { background: var(--bg-primary); padding: 2px 7px; border-radius: 4px; font-size: 11px; }
    .popup-actions { display: flex; gap: 6px; }
    .popup-btn {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .popup-btn:hover { background: var(--saffron); color: white; border-color: var(--saffron); }
    .popup-btn.confirm { border-color: var(--india-green); color: var(--india-green); }
    .popup-btn.confirm:hover { background: var(--india-green); color: white; }

    .legend {
      position: absolute;
      bottom: 32px;
      left: 16px;
      background: white;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      z-index: 1000;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .legend h4 { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-secondary); letter-spacing: 0.5px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      flex-direction: column;
      gap: 12px;
    }

    @media(max-width:768px) {
      .map-layout { flex-direction: column; }
      .map-sidebar { width: 100%; height: 45vh; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="logo-icon">♿</div>
    <div>
      <h1>SAHAJ</h1>
      <span>Aasaan Raasta · Sabke Liye</span>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="map.html" class="active">🗺 Map</a></li>
    <li><a href="add-location.html">📍 Add Location</a></li>
    <li><a href="dashboard.html">📊 Dashboard</a></li>
  </ul>
  <div class="nav-auth" id="navAuth">
    <a href="login.html" class="btn btn-outline btn-sm">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm">Join Now</a>
  </div>
</nav>

<div style="padding-top:70px;">
<div class="map-layout" style="position:relative;">

  <!-- SIDEBAR -->
  <div class="map-sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h2>🗺 SAHAJ — Accessibility Map</h2>
        <span class="count-badge" id="locationCount">0</span>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search city, place..." oninput="filterLocations()">
      </div>
    </div>

    <div class="filter-section">
      <label>FILTER BY STATUS</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
        <button class="filter-chip active" data-status="all" onclick="setFilter('status','all',this)">All</button>
        <button class="filter-chip" data-status="fully_accessible" onclick="setFilter('status','fully_accessible',this)">🟢 Full</button>
        <button class="filter-chip" data-status="partially_accessible" onclick="setFilter('status','partially_accessible',this)">🟡 Partial</button>
        <button class="filter-chip" data-status="not_accessible" onclick="setFilter('status','not_accessible',this)">🔴 None</button>
      </div>
      <label>FILTER BY TYPE</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        <button class="filter-chip active" data-type="all" onclick="setFilter('type','all',this)">All Types</button>
        <button class="filter-chip" data-type="hospital" onclick="setFilter('type','hospital',this)">🏨 Hospital</button>
        <button class="filter-chip" data-type="metro_station" onclick="setFilter('type','metro_station',this)">🚇 Metro</button>
        <button class="filter-chip" data-type="government_office" onclick="setFilter('type','government_office',this)">🏛 Govt</button>
        <button class="filter-chip" data-type="bus_stop" onclick="setFilter('type','bus_stop',this)">🚌 Bus</button>
        <button class="filter-chip" data-type="park" onclick="setFilter('type','park',this)">🌳 Park</button>
      </div>
    </div>

    <div class="location-list-container" id="locationList">
      <div style="text-align:center;padding:40px 20px;">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);margin-top:12px;">Locations dhundh rahe hain...</p>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div style="flex:1;position:relative;">
    <div id="map"></div>

    <!-- Legend -->
    <div class="legend">
      <h4>ACCESSIBILITY STATUS</h4>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accessible-full)"></div> Fully Accessible</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accessible-partial)"></div> Partially Accessible</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accessible-none)"></div> Not Accessible</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accessible-unknown)"></div> Unknown</div>
    </div>
  </div>
</div>
</div>

<!-- FAB: Add Location -->
<a href="add-location.html" class="fab" title="Add Accessibility Location">+</a>

<div class="toast-container" id="toastContainer"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/map.js"></script>
</body>
</html>
